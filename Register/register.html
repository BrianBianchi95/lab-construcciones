<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/styles.css">
    <title>Registro</title>
</head>
<body>
    <div class="register-container">
        <img src="./assets/logo_lab_blanco_sf_2.PNG" alt="Logo de LAB Construcciones" class="logo-register">
        <form class="form-register" action="../Login/Login.html">
            <h4>Regístrate</h4>
            <input class="controls" type="text" name="nombres" id="nombres" placeholder="Ingrese su Nombre" required>
            <input class="controls" type="text" name="apellidos" id="apellidos" placeholder="Ingrese su Apellido" required>
            <input class="controls" type="email" name="correo" id="correo" placeholder="Ingrese su Correo electrónico" required>
            <input class="controls" type="password" name="contrasena" id="contrasena" placeholder="Ingrese su contraseña" required>
            <input class="botons" type="submit" value="Registrar">
            <a href="../Login/Login.html">¿Ya tengo cuenta? </a>
            <a href="../Landing/index.html">← Volver al inicio</a>
        </form>
    </div>
</body>
</html>
