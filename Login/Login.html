<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
    <div class="login-container">
        <img src="./assets/logo_lab_blanco_sf_2.PNG" alt="Logo de LAB Construcciones" class="logo-login">
        <form class="form-login" action="../Landing/index.html" method="get">
            <h5>Inicio de Sesión</h5>
            <input class="controls" type="email" name="email" placeholder="Correo Electrónico" required>
            <input class="controls" type="password" name="contrasena" placeholder="Contraseña" required>
            <button class="buttons" type="submit">Ingresar</button>
            <a href="../Register/register.html">¿No tienes cuenta?</a>
            <a href="/index.html">← Volver al inicio</a>
        </form>
    </div>
</body>
</html>
